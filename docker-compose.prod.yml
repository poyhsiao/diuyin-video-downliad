services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: douyin-api
    volumes:
      - data:/data
    env_file:
      - .env.production
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - API_WORKERS=8
      - API_RELOAD=false
    restart: always

  nginx:
    image: nginx:latest
    container_name: douyin-nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./data:/data:ro
      - nginx-secrets:/etc/nginx/secrets
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app
    restart: always

volumes:
  data:
  nginx-secrets: