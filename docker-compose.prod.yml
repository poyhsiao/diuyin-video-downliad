services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: douyin-api
    volumes:
      - data:/data
    env_file:
      - .env.production
    ports:
      - "${APP_PORT:-8000}:${APP_PORT:-8000}"
    environment:
      - API_HOST=${API_HOST:-0.0.0.0}
      - API_PORT=${API_PORT:-8000}
      - API_WORKERS=${API_WORKERS:-8}
      - API_RELOAD=${API_RELOAD:-false}
    restart: always

  nginx:
    image: nginx:latest
    container_name: douyin-nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./data:/data:ro
      - nginx-secrets:/etc/nginx/secrets
    ports:
      - "${NGINX_PORT:-80}:${NGINX_PORT:-80}"
      - "${NGINX_SSL_PORT:-443}:${NGINX_SSL_PORT:-443}"
    depends_on:
      - app
    restart: always

volumes:
  data:
  nginx-secrets: