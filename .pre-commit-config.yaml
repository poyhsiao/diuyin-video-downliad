# Pre-commit hooks for diuyin-video-downliad
# Install: pip install pre-commit && pre-commit install

repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff (lint)
        entry: uv run ruff check .
        language: system
        types: [python]
        pass_filenames: true

      - id: ruff-format-check
        name: ruff (format check)
        entry: uv run ruff format --check .
        language: system
        types: [python]
        pass_filenames: true

      - id: pytest
        name: pytest (tests)
        entry: uv run pytest tests/ -v --tb=short
        language: system
        types: [python]
        pass_filenames: false
        pass_args: '--timeout=60'
